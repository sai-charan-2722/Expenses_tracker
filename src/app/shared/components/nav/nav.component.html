<nav class="nav">
  <a class="nav-logo" href="#" (click)="navigateHome()">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M11 7H6a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
    </div>
    <span class="nav-logo-text">Split<span>Smart</span></span>
  </a>
  <ng-container *ngIf="showHomeActions; else groupActions">
    <div class="nav-actions">
      <button class="btn btn-primary btn-sm" (click)="createGroup.emit()">
        <span class="material-icons-round">add</span> New Group
      </button>
    </div>
  </ng-container>
  <ng-template #groupActions>
    <div class="nav-actions">
      <span style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);padding-left:8px;">
        <button class="nav-back" (click)="navigateHome()">
          <span class="material-icons-round" style="font-size:16px">arrow_back_ios</span> Groups
        </button>
        <span class="nav-sep">/</span>
        <span class="nav-title">{{ currentGroup?.name }}</span>
      </span>
      <button class="btn btn-outline btn-sm" (click)="addMember.emit()">
        <span class="material-icons-round">person_add</span> Add Member
      </button>
      <button class="btn btn-primary btn-sm" (click)="addExpense.emit()">
        <span class="material-icons-round">add</span> Add Expense
      </button>
    </div>
  </ng-template>
</nav>
