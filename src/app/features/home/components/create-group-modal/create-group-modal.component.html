<div class="modal-overlay" [class.open]="true">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Create New Group</span>
      <button class="btn-icon" (click)="close.emit()"><span class="material-icons-round">close</span></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Group Name <span>*</span></label>
        <input class="form-input" [(ngModel)]="grpName" #groupName="ngModel" required maxlength="50" placeholder="e.g. Trip to Goa, Flat expenses…" name="groupName">
        <span class="form-error" *ngIf="groupName.invalid && (groupName.dirty || groupName.touched || submitted)">Group name is required</span>
      </div>
      <div class="form-group">
        <label class="form-label">Icon</label>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          <span *ngFor="let emoji of emojis"
                (click)="grpEmoji = emoji"
                [style.border]="'2px solid ' + (grpEmoji === emoji ? 'var(--primary)' : 'transparent')"
                [style.background]="grpEmoji === emoji ? 'var(--primary-light)' : 'transparent'"
                style="cursor:pointer;font-size:22px;padding:6px 8px;border-radius:10px;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center"
                title="{{emoji}}">{{emoji}}</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Add Members</label>
        <div style="display:flex;gap:8px">
          <input class="form-input" [(ngModel)]="memberInputText" placeholder="Member name"
                 (keydown.enter)="addMember(); $event.preventDefault()" name="memberInput">
          <button class="btn btn-outline" (click)="addMember()" style="white-space:nowrap;flex-shrink:0">Add</button>
        </div>
        <span class="form-error" *ngIf="showMemberError">Please enter a valid member name</span>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">
          <div *ngFor="let member of newMembers; let i = index" style="display:flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary);padding:4px 10px;border-radius:100px;font-size:13px;font-weight:500">
            {{getUserInitials(member.name)}} {{member.name}}
            <span (click)="removeMember(i)" style="cursor:pointer;margin-left:2px;opacity:0.7;font-size:15px;line-height:1">×</span>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" (click)="close.emit()">Cancel</button>
      <button class="btn btn-primary" [disabled]="!grpName.trim()" (click)="submitCreateGroup()">Create Group</button>
    </div>
  </div>
</div>
